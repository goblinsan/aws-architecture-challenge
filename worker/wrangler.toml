name = "aws-architecture-challenge"
main = "index.ts"
compatibility_date = "2024-09-03"
compatibility_flags = ["nodejs_compat"]

[assets]
# Built frontend output; run `npm run build` before deploying.
directory = "../dist"
not_found_handling = "single-page-application"

# KV namespace for game session state and player entries.
[[kv_namespaces]]
binding = "GAME_KV"
id = "9a55cd46fb8b457889345a0d13831183"
preview_id = "d3595311daf045da87d7c3b5d2c732dd"

[vars]
# Default session configuration used when no facilitator has configured the
# session yet. Override by writing "session:config" to GAME_KV at runtime.
DEFAULT_CHALLENGE_POOL = "payments-processing,analytics-ingestion,event-driven-onboarding,media-processing,global-customer-support,iot-telemetry,internal-api-platform"
DEFAULT_MODE = "single"
DEFAULT_ASSIGNMENT_STRATEGY = "round-robin"
